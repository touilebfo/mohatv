<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MohaTv Pro | Developed By Touileb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.1); border-radius: 24px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { transform: translateY(-10px); border-color: #3b82f6; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); display: flex; align-items: center; justify-content: center; font-weight: 900; border: 2px solid rgba(255,255,255,0.1); }
        #playerScreen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .plyr--full-ui { --plyr-color-main: #3b82f6; }
    </style>
</head>
<body>

    <div id="loginGate" class="fixed inset-0 z-[1100] flex items-center justify-center bg-[#020617]">
        <div class="text-center w-full max-w-xs p-6">
            <h1 class="text-6xl font-black mb-10 italic tracking-tighter text-white">Moha<span class="text-blue-500">Tv</span></h1>
            <input type="text" id="usernameInput" placeholder="أدخل اسمك المستعار..." 
                   class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-800 text-center text-white mb-4 focus:border-blue-500 outline-none transition-all">
            <button onclick="accessApp()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black text-xl shadow-lg transition-transform active:scale-95">دخول للمنصة</button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen flex flex-col">
        <header class="p-4 lg:px-12 flex justify-between items-center sticky top-0 bg-[#020617]/80 backdrop-blur-lg z-50 border-b border-white/5">
            <h2 class="text-2xl font-black italic tracking-tighter">Moha<span class="text-blue-500">Tv</span></h2>
            <div class="flex items-center gap-3 bg-slate-900/50 p-1.5 pr-4 rounded-full border border-slate-800">
                <span id="displayUserName" class="text-sm font-bold opacity-70"></span>
                <div id="userInitials" class="user-avatar text-xs"></div>
            </div>
        </header>

        <main class="p-6 lg:p-12 max-w-7xl mx-auto w-full flex-grow">
            <div class="mb-10 flex items-center gap-4">
                <div class="h-8 w-1.5 bg-blue-600 rounded-full shadow-[0_0_15px_#3b82f6]"></div>
                <h3 class="text-2xl font-black uppercase tracking-widest italic">القنوات الجزائرية والعالمية</h3>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="channelsGrid"></div>
        </main>

        <footer class="p-10 text-center border-t border-white/5">
            <p class="text-gray-600 font-bold tracking-[0.3em] text-[10px] mb-2 uppercase">Official Platform</p>
            <p class="text-sm font-black text-gray-400">Developed By <span class="text-blue-500 underline decoration-2 underline-offset-4">Touileb</span></p>
        </footer>
    </div>

    <div id="playerScreen">
        <div class="p-4 bg-slate-950 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
                <span id="currentChannelName" class="font-bold text-blue-400"></span>
            </div>
            <button onclick="stopStream()" class="bg-red-600/10 text-red-500 hover:bg-red-600 hover:text-white px-6 py-2 rounded-xl font-black text-xs transition-all">إغلاق ×</button>
        </div>
        <div class="flex-grow flex items-center justify-center bg-black relative">
            <video id="videoPlayer" playsinline controls class="w-full h-full shadow-2xl"></video>
            <div id="loadingOverlay" class="absolute inset-0 flex items-center justify-center bg-black/50 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
            </div>
        </div>
    </div>

    <script>
        // قائمة القنوات المضمونة (رسمية وتدوم طويلاً)
        const channelList = [
            { 
                name: "البلاد الجزائرية", 
                url: "https://cqr2aqt6.58103793.net:8443/hls/9cznqhfs9.m3u8?s=k3tjJaQ_XTA4r1AeikCylw&e=1776732469", 
                logo: "https://www.elbilad.net/static/images/logo.png" 
            },
            { 
                name: "الشروق TV", 
                url: "https://echourouk.itworksonline.net/echourouk/echourouk.smil/playlist.m3u8", 
                logo: "https://tv.echoroukonline.com/wp-content/uploads/2021/04/logo-header.png" 
            },
            { 
                name: "beIN News", 
                url: "https://list.iptvcat.com/my_list/s/06c69efb1bdaf8c9e49c91ae16a63ec6.m3u8", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/BeIN_Sports_logo.svg/512px-BeIN_Sports_logo.svg.png" 
            },
            { 
                name: "الجزيرة مباشر", 
                url: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Aljazeera_Channel_Logo.svg/512px-Aljazeera_Channel_Logo.svg.png" 
            },
            { 
                name: "سكاي نيوز", 
                url: "https://snarabia.akamaized.net/hls/live/2034114/snarabia/playlist.m3u8", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Sky_News_Arabia_logo.svg/512px-Sky_News_Arabia_logo.svg.png" 
            },
            { 
                name: "TRT العربية", 
                url: "https://trt-arabia.live.api.ott.net.tr/out/v1/7106655c65444399996d93427847c2a7/index.m3u8", 
                logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/TRT_Arabi_2017.svg/512px-TRT_Arabi_2017.svg.png" 
            },
            { 
                name: "مكة المكرمة", 
                url: "https://win.holymakkah.com/live/smil:makkah.smil/playlist.m3u8", 
                logo: "https://cdn-icons-png.flaticon.com/512/3208/3208094.png" 
            },
            { 
                name: "4Kids (Proxy)", 
                url: "https://api.allorigins.win/raw?url=https://list.iptvcat.com/my_list/s/6a0b6d93c9c57a7d667e15283ff1a771.m3u8", 
                logo: "https://i.ibb.co/V9fP6pY/4kids.png" 
            }
        ];

        let hlsInstance = null;
        const videoElement = document.getElementById('videoPlayer');
        const plyrPlayer = new Plyr(videoElement);

        window.onload = () => {
            const savedUser = localStorage.getItem('mohatv_user');
            if(savedUser) launchApp(savedUser);
        };

        function accessApp() {
            const name = document.getElementById('usernameInput').value;
            if(!name) return;
            localStorage.setItem('mohatv_user', name);
            launchApp(name);
        }

        function launchApp(name) {
            document.getElementById('loginGate').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUserName').innerText = name;
            document.getElementById('userInitials').innerText = name.substring(0,2).toUpperCase();
            
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = channelList.map(c => `
                <div class="glass-card p-6 flex flex-col items-center text-center cursor-pointer" onclick="playChannel('${c.url}', '${c.name}')">
                    <div class="w-16 h-16 mb-4 flex items-center justify-center">
                        <img src="${c.logo}" class="max-w-full max-h-full object-contain pointer-events-none" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3208/3208094.png'">
                    </div>
                    <div class="font-black text-[10px] tracking-widest text-gray-200 uppercase">${c.name}</div>
                    <div class="mt-2 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[8px] font-black text-green-500 tracking-tighter uppercase italic">Live Now</span>
                    </div>
                </div>
            `).join('');
        }

        function playChannel(url, name) {
            document.getElementById('playerScreen').style.display = 'flex';
            document.getElementById('currentChannelName').innerText = "بث مباشر: " + name;
            document.getElementById('loadingOverlay').classList.remove('hidden');

            if (hlsInstance) { hlsInstance.destroy(); }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ xhrSetup: function(xhr) { xhr.withCredentials = false; } });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoElement);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    videoElement.play().catch(() => console.log("Manual play required"));
                });
                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) { document.getElementById('loadingOverlay').classList.add('hidden'); }
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = url;
                videoElement.play();
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function stopStream() {
            document.getElementById('playerScreen').style.display = 'none';
            videoElement.pause();
            if(hlsInstance) hlsInstance.detachMedia();
        }
    </script>
</body>
</html>
