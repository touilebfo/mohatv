<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MohaTv Pro | Developed By Touileb</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 24px;
            transition: 0.4s;
        }
        .glass-card:hover { transform: translateY(-10px); border-color: #3b82f6; }
        .user-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900;
        }
        #playerScreen { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginGate" class="fixed inset-0 flex items-center justify-center bg-[#020617]">
    <div class="text-center w-full max-w-xs p-6">
        <h1 class="text-6xl font-black mb-10">Moha<span class="text-blue-500">Tv</span></h1>
        <input id="usernameInput" placeholder="أدخل اسمك"
        class="w-full p-4 bg-slate-900 rounded-xl mb-4 text-center">
        <button onclick="accessApp()" class="w-full bg-blue-600 p-4 rounded-xl">دخول</button>
    </div>
</div>

<!-- APP -->
<div id="mainApp" class="hidden">
    <header class="p-4 flex justify-between">
        <h2>MohaTv</h2>
        <div id="userInitials" class="user-avatar"></div>
    </header>

    <main class="p-6">
        <div id="channelsGrid" class="grid grid-cols-2 gap-4"></div>
    </main>
</div>

<!-- PLAYER -->
<div id="playerScreen">
    <button onclick="stopStream()">❌ إغلاق</button>
    <video id="videoPlayer" controls class="w-full h-full"></video>
</div>

<script>
const channelList = [
    {
        name: "4Kids Algeria",
        url: "https://list.iptvcat.com/my_list/s/6a0b6d93c9c57a7d667e15283ff1a771.m3u8",
        backup: "https://live-hls-web-aja.getaj.net/AJA/index.m3u8",
        logo: ""
    },
    {
        name: "France 24 AR",
        url: "https://static.france24.com/live/f24_ar.m3u8",
        backup: "https://static.france24.com/live/F24_AR_HI_HLS/live_web.m3u8",
        logo: ""
    },
    {
        name: "Al Kass One",
        url: "https://alkass01.akamaized.net/hls/live/2030062/alkass01/index.m3u8",
        backup: "https://ntv1.akamaized.net/hls/live/2032018/NTV1/master.m3u8",
        logo: ""
    },
    {
        name: "beIN News",
        url: "https://beinsports.ercdn.net/beinsports/news.m3u8",
        backup: "https://dwstream3-lh.akamaihd.net/i/dwstream3_live@124409/master.m3u8",
        logo: ""
    }
];

let hls;
let triedBackup = false;

function accessApp(){
    const name = document.getElementById("usernameInput").value;
    if(!name) return;

    document.getElementById("loginGate").style.display="none";
    document.getElementById("mainApp").classList.remove("hidden");

    document.getElementById("userInitials").innerText = name.substring(0,2);

    const grid = document.getElementById("channelsGrid");
    grid.innerHTML = channelList.map(c => `
        <div onclick="playChannel('${c.url}','${c.name}','${c.backup}')"
        class="glass-card p-4 text-center cursor-pointer">
            ${c.name}
        </div>
    `).join("");
}

function playChannel(url,name,backup){
    document.getElementById("playerScreen").style.display="flex";
    triedBackup = false;
    loadStream(url,backup);
}

function loadStream(url,backup){
    const video = document.getElementById("videoPlayer");

    if(hls) hls.destroy();

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.ERROR,(e,data)=>{
            if(data.fatal){
                if(!triedBackup && backup){
                    triedBackup = true;
                    loadStream(backup);
                }else{
                    alert("القناة لا تعمل");
                    stopStream();
                }
            }
        });

    } else {
        video.src = url;
    }
}

function stopStream(){
    document.getElementById("playerScreen").style.display="none";
    const video = document.getElementById("videoPlayer");
    video.pause();
    if(hls) hls.destroy();
}
</script>

</body>
</html>
